# ── v4call-node — headless HTTPS reverse proxy (Docker / compose) ─────────────
# This is the PRODUCTION config: TLS terminator in front of the headless node.
# The node serves no HTML — only JSON + WebSocket — so this config has, by design,
# NO static file serving, NO info.html block, and NO auth_basic login gate
# (basic-auth on /socket.io/ would break the client; on /federation it would
# break every peer). Browser access is governed by the node's CORS allowlist;
# admin endpoints are guarded by ADMIN_KEY. That is the correct model here.
#
# FIRST BOOT (no cert yet): start with nginx/v4call.http.conf instead (it boots
# without a cert and serves the ACME challenge). Issue the cert with the certbot
# service, then switch the compose mount to THIS file and `docker compose up -d`.
# See "Running with Docker Instead" in walkthrough.wiki.
#
# Under compose the node container is reachable as `app:3000` (its compose
# service name). Substitute node.yourdomain.com throughout.

# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name node.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — headless v4call-node
server {
    listen 443 ssl;
    server_name node.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/node.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/node.yourdomain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff;

    # Socket.io — the client's main WebSocket transport (requires upgrade headers)
    location /socket.io/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Federation WebSocket — server-to-server. NEVER auth-gate this; peer
    # validation happens inside the node via the FEDERATION_PEERS allowlist.
    location /federation {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Optional — serve the v4call-app client SAME-ORIGIN under the node (no CORS).
    # Requires mounting the v4call-app repo into the nginx container (see the
    # commented volume in docker-compose.yml). alias + index only — do NOT add
    # try_files (alias+try_files 404s files). Then the client is at
    # https://node.yourdomain.com/app/desktop-app.html
    #location /app/ {
    #    alias /usr/share/nginx/v4call-app/;
    #    index select.html;
    #}

    # Everything else — the JSON API (/api/info, /rates/:u, /admin/*,
    # /.well-known/v4call-server.json, /join-token, /debug-state)
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}

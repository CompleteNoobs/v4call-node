# ── v4call-node — HTTP-only bootstrap (pre-cert) ──────────────────────────────
# Use this on a FRESH host that has no TLS certificate yet. It boots nginx
# without referencing any cert (so `docker compose up -d --build` comes up
# cleanly), serves the ACME HTTP-01 challenge for certbot, and proxies the
# headless node over plain HTTP so you can smoke-test before TLS exists.
#
# Two-phase deploy (HTTP-first-then-cert):
#   1. Mount THIS file as the nginx default (it is the compose default), boot,
#      and confirm `curl http://node.yourdomain.com/api/info` answers.
#   2. Issue the cert:
#        docker compose run --rm --entrypoint certbot certbot \
#          certonly --webroot -w /var/www/certbot -d node.yourdomain.com
#   3. Switch the compose nginx volume to nginx/v4call.conf (the HTTPS config)
#      and `docker compose up -d`.
#
# Do NOT leave a production node on this plain-HTTP config. Hive Keychain and the
# client expect HTTPS. Substitute node.yourdomain.com throughout.

server {
    listen 80;
    server_name node.yourdomain.com;

    # ACME HTTP-01 challenge (certbot webroot — mounted at /var/www/certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Socket.io — needs upgrade headers even over plain HTTP for the smoke test
    location /socket.io/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location /federation {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # JSON API + everything else
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;
}

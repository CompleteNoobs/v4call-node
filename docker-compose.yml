name: v4call-node

services:

  # ── v4call-node (headless server) ──────────────────────────────────────────
  app:
    build: .
    container_name: v4call-node
    restart: unless-stopped
    env_file: .env
    environment:
      BIND_HOST: "0.0.0.0"
    volumes:
      - ./data/logs:/app/logs
      # Nostr federation identity key — own mount so it survives a
      # `docker compose down && build --no-cache`. Do NOT delete ./data/nostr
      # on the host or the server loses its Nostr identity (re-announce needed).
      - ./data/nostr:/app/nostr
      # Durable escrow ledger + signed domain-proof JSON live under ./data so
      # they survive rebuilds (V4CALL_SERVER_JSON_PATH / ESCROW_DB_PATH point here).
      - ./data:/app/data
    networks:
      - internal
    healthcheck:
      test:  ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/info', r => process.exit(r.statusCode === 200 ? 0 : 1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Nginx Reverse Proxy (TLS terminator only — no static, no auth_basic) ────
  nginx:
    image: nginx:alpine
    container_name: v4call-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # FIRST BOOT (no cert yet): the HTTP-only bootstrap config is the default so
      # `docker compose up -d --build` comes up without a certificate and serves
      # the ACME challenge. After issuing the cert (see the certbot service +
      # walkthrough.wiki "Running with Docker Instead"), switch the line below to
      # the HTTPS config and `docker compose up -d`:
      #   - ./nginx/v4call.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/v4call.http.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
      # Optional — serve the v4call-app client same-origin under the node via the
      # /app/ alias in nginx/v4call.conf (uncomment there too). Point this at your
      # local v4call-app checkout (sibling of v4call-node):
      #- ../v4call-app:/usr/share/nginx/v4call-app:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

  # ── Certbot (Let's Encrypt SSL) ────────────────────────────────────────────
  # NOTE: This service has NO entrypoint/command — it is only used via
  # "docker compose run" for initial cert issuance and manual renewals.
  # Auto-renewal is handled by a cron job (see setup guide).
  certbot:
    image: certbot/certbot
    container_name: v4call-certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
      - ./data/certbot/logs:/var/log/letsencrypt

networks:
  internal:
    driver: bridge

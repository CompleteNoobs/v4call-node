name: v4call

services:

  # ── v4call Node.js App ─────────────────────────────────────────────────────
  app:
    build: .
    container_name: v4call-app
    restart: unless-stopped
    env_file: .env
    environment:
      BIND_HOST: "0.0.0.0"
    volumes:
      - ./data/logs:/app/logs
    networks:
      - internal
    healthcheck:
      test:  ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/debug-state', r => process.exit(r.statusCode === 200 ? 0 : 1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: v4call-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/v4call.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro          # add this
      - ./public/info.html:/usr/share/nginx/html/info.html:ro  # add this
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

  # ── Certbot (Let's Encrypt SSL) ────────────────────────────────────────────
  # NOTE: This service has NO entrypoint/command — it is only used via
  # "docker compose run" for initial cert issuance and manual renewals.
  # Auto-renewal is handled by a cron job (see setup guide).
  certbot:
    image: certbot/certbot
    container_name: v4call-certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
      - ./data/certbot/logs:/var/log/letsencrypt

networks:
  internal:
    driver: bridge
